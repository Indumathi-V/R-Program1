name: R Autograding – ggplot2 Program 1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          cache: true  # optional but helpful[web:14]

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::ggplot2
            any::testthat
        # This avoids direct install.packages() and handles temp dirs for you.[web:14][web:34]

      - name: Run tests
        run: |
          library(testthat)
          source("solution.R")
          testthat::test_dir("tests/testthat")
        shell: Rscript {0}[web:14][web:33]
